<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Committee Dashboard • Abstract Portal</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar" aria-label="topbar">
      <a class="brand" href="/" aria-label="home">
        <div class="logo" aria-hidden="true">
          <span class="logo-mark">AP</span>
        </div>
        <span class="brand-name">Abstract Portal</span>
      </a>
      <div class="topbar-actions">
        <a class="btn btn-secondary" href="/committee-members">Committee Member Info</a>
      </div>
    </header>

    <main class="page">
      <section class="card">
        <div class="dashboard-shell">
          <section class="dashboard-hero hero-committee">
            <span class="dashboard-kicker">Committee Review</span>
            <h1>Committee Dashboard</h1>
            <p>Coordinate volunteer applications, pending accounts, and final colloquium oversight.</p>
          </section>

          <section class="dashboard-grid">
            <div class="tile tile-accent-committee"><h2>Committee Info</h2><p>Update your profile and public committee-facing information.</p><div><a class="btn" href="/committee/info">My Info</a></div></div>
          </section>

          <form method="post" action="/logout" style="margin-top: 6px;">
            <button class="btn btn-secondary" type="submit">Logout</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
